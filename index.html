<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pulsar Boolean Checker</title>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3250;
    --accent:#4f6ef7; --green:#22c55e; --red:#ef4444; --yellow:#f59e0b;
    --purple:#a78bfa; --text:#e2e8f0; --muted:#8892b0; --r:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}

  header{padding:14px 22px 11px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:12px;}
  header h1{font-size:17px;font-weight:700;}
  header p{color:var(--muted);font-size:12px;}

  .layout{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 50px);}
  .panel{padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
  .panel-left{border-right:1px solid var(--border);}

  h2{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);margin-bottom:5px;}

  textarea,input[type=text]{
    width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
    color:var(--text);font-size:12.5px;padding:7px 10px;resize:vertical;outline:none;
    transition:border-color .15s;font-family:'Menlo','Fira Code',monospace;
  }
  textarea:focus,input:focus{border-color:var(--accent);}

  /* Item cards */
  .items-header{display:flex;align-items:center;justify-content:space-between;}
  .btn-add{
    font-size:12px;font-weight:600;color:var(--accent);background:rgba(79,110,247,.1);
    border:1px solid rgba(79,110,247,.3);border-radius:6px;padding:4px 10px;cursor:pointer;
  }
  .btn-add:hover{background:rgba(79,110,247,.18);}

  #itemsList{display:flex;flex-direction:column;gap:10px;}

  .item-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;}
  .item-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
  .item-num{font-size:11px;font-weight:700;color:var(--muted);}
  .btn-remove{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;line-height:1;padding:0 2px;}
  .btn-remove:hover{color:var(--red);}

  .url-row{display:flex;gap:6px;margin-bottom:5px;}
  .url-row input{flex:1;font-size:12px;}
  .btn-fetch{
    background:var(--surface2);color:var(--text);border:1px solid var(--border);
    border-radius:var(--r);font-size:11.5px;font-weight:600;padding:5px 10px;
    cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;
  }
  .btn-fetch:hover{border-color:var(--accent);color:var(--accent);}

  .item-status{font-size:11px;margin-bottom:5px;min-height:14px;color:var(--muted);}
  .item-status.ok{color:var(--green);}
  .item-status.err{color:var(--red);}
  .item-status.warn{color:var(--yellow);}
  .item-status.loading{color:var(--accent);}

  .or-sep{font-size:10.5px;color:var(--muted);text-align:center;margin:4px 0 3px;}

  /* Check button */
  .btn-check{
    width:100%;padding:10px;background:var(--accent);color:#fff;
    font-size:13px;font-weight:700;cursor:pointer;border:none;border-radius:var(--r);
    transition:opacity .15s;flex-shrink:0;
  }
  .btn-check:hover{opacity:.88;}

  /* ── Result cards ── */
  #resultsArea{display:flex;flex-direction:column;gap:10px;}

  .result-card{border-radius:var(--r);border:1px solid var(--border);overflow:hidden;}
  .result-card.match  {border-color:rgba(34,197,94,.3);}
  .result-card.nomatch{border-color:rgba(239,68,68,.3);}
  .result-card.idle   {border-color:var(--border);}

  .result-head{
    display:flex;align-items:flex-start;gap:10px;padding:10px 13px;
    border-bottom:1px solid var(--border);
  }
  .result-card.match   .result-head{background:rgba(34,197,94,.06);}
  .result-card.nomatch .result-head{background:rgba(239,68,68,.06);}
  .result-card.idle    .result-head{background:var(--surface);}

  .result-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
  .result-verdict{font-size:13px;font-weight:700;line-height:1.2;}
  .result-card.match   .result-verdict{color:var(--green);}
  .result-card.nomatch .result-verdict{color:var(--red);}
  .result-source{font-size:11px;color:var(--muted);margin-top:2px;word-break:break-all;}

  .result-body{padding:8px 13px 10px;}

  .why-item{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);}
  .why-item:last-child{border-bottom:none;}
  .why-icon{font-size:13px;flex-shrink:0;margin-top:1px;}
  .why-text strong{display:block;font-size:12px;font-weight:600;line-height:1.3;}
  .why-text span{font-size:11px;color:var(--muted);}

  .tree-toggle{font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline;display:inline-block;margin-top:6px;}
  .tree-toggle:hover{color:var(--text);}
  .result-tree{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}

  /* Tree */
  .tree{font-size:11.5px;}
  .tree-node{margin:1px 0;}
  .row{display:flex;align-items:flex-start;gap:5px;padding:2px 5px;border-radius:3px;cursor:default;}
  .row:hover{background:var(--surface2);}
  .row.click{cursor:pointer;}
  .tog{width:11px;flex-shrink:0;font-size:8px;color:var(--muted);margin-top:3px;}
  .ic{flex-shrink:0;font-size:11px;}
  .lbl{flex:1;} .lbl .kd{font-weight:700;margin-right:3px;}
  .kd.or{color:#818cf8;} .kd.and{color:#38bdf8;} .kd.not_{color:var(--yellow);}
  .kd.near{color:var(--purple);}
  .lbl .dt{color:var(--muted);}
  .lbl .hit{color:var(--green);font-weight:600;}
  .lbl .miss{color:var(--red);}
  .children{margin-left:16px;border-left:1px solid var(--border);padding-left:7px;}
  .collapsed>.children{display:none;}

  .expand-btn{
    display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:var(--accent);
    cursor:pointer;padding:2px 7px;border-radius:4px;margin:2px 0;
    border:1px solid rgba(79,110,247,.22);background:rgba(79,110,247,.06);
  }
  .expand-btn:hover{background:rgba(79,110,247,.14);}

  .idle-msg{color:var(--muted);font-size:13px;text-align:center;padding:40px 20px;}
</style>
</head>
<body>

<header>
  <h1>🔍 Pulsar Boolean Checker</h1>
  <p>Test multiple articles or posts against a boolean — see exactly why each one would or wouldn't be ingested.</p>
</header>

<div class="layout">

<!-- ── LEFT ── -->
<div class="panel panel-left">

  <div>
    <h2>Boolean String</h2>
    <textarea id="boolInput" rows="7" placeholder='("Humanitarian aid" OR "International aid" OR ODA) AND NOT ("Gaza" OR "Palestine") AND NOT RETWEET'></textarea>
  </div>

  <div>
    <div class="items-header">
      <h2>Content to test</h2>
      <button class="btn-add" onclick="addItem()">+ Add article / post</button>
    </div>
    <div id="itemsList"></div>
  </div>

  <button class="btn-check" onclick="runCheck()">▶  Check all</button>

</div>

<!-- ── RIGHT ── -->
<div class="panel panel-right">
  <h2>Results</h2>
  <div id="resultsArea">
    <div class="idle-msg">Results will appear here after you click Check all.</div>
  </div>
</div>

</div>

<script>
// ─── IDs ─────────────────────────────────────────────────────────────────────
let nextId = 1;

// ─── TOKENISER ────────────────────────────────────────────────────────────────
const TK={OR:'OR',AND:'AND',NOT:'NOT',NEAR:'NEAR',LP:'LP',RP:'RP',PHRASE:'PHRASE',WORD:'WORD',FIELD:'FIELD',EOF:'EOF'};
class Tok{constructor(k,v='',n=0){this.kind=k;this.val=v;this.nearN=n;}}

function tokenise(q){
  const t=[];let i=0,L=q.length;
  while(i<L){
    const c=q[i];
    if(/\s/.test(c)){i++;continue;}
    if(c==='('){t.push(new Tok(TK.LP));i++;continue;}
    if(c===')'){t.push(new Tok(TK.RP));i++;continue;}
    if(c==='"'){let j=q.indexOf('"',i+1);if(j<0)j=L;t.push(new Tok(TK.PHRASE,q.slice(i+1,j)));i=j+1;continue;}
    if(c==='-'){t.push(new Tok(TK.NOT,'-'));i++;continue;}
    let j=i;while(j<L&&!/\s/.test(q[j])&&!'()"'.includes(q[j]))j++;
    const w=q.slice(i,j),up=w.toUpperCase().replace(/\($/,'');
    if(up==='AND')t.push(new Tok(TK.AND));
    else if(up==='OR')t.push(new Tok(TK.OR));
    else if(up==='NOT'){t.push(new Tok(TK.NOT,'NOT'));if(w.endsWith('('))t.push(new Tok(TK.LP));}
    else if(/^NEAR\/\d+$/.test(up))t.push(new Tok(TK.NEAR,w,parseInt(up.slice(5))));
    else if(w.includes(':')&&!w.startsWith(':')&&!w.endsWith(':'))t.push(new Tok(TK.FIELD,w));
    else t.push(new Tok(TK.WORD,w));
    i=j;
  }
  t.push(new Tok(TK.EOF));return t;
}

// ─── AST ──────────────────────────────────────────────────────────────────────
class N{constructor(k,o={}){this.kind=k;this.children=o.c||[];this.value=o.v||'';this.nearN=o.n||0;}}

// ─── PARSER ───────────────────────────────────────────────────────────────────
class Parser{
  constructor(t){this.t=t;this.p=0;}
  peek(){return this.t[this.p];}
  eat(k){const t=this.t[this.p];if(k&&t.kind!==k)throw new Error(`Expected ${k}, got "${t.val||t.kind}"`);this.p++;return t;}
  parse(){return this.or();}
  or(){
    let l=this.and();
    while(this.peek().kind===TK.OR){this.eat();const r=this.and();
      l=l.kind==='or'?(l.children.push(r),l):new N('or',{c:[l,r]});}
    return l;
  }
  and(){
    let l=this.not();
    while(![TK.OR,TK.RP,TK.EOF].includes(this.peek().kind)){
      if(this.peek().kind===TK.AND)this.eat();
      else if(![TK.NOT,TK.LP,TK.PHRASE,TK.WORD,TK.FIELD].includes(this.peek().kind))break;
      const r=this.not();
      l=l.kind==='and'?(l.children.push(r),l):new N('and',{c:[l,r]});
    }
    return l;
  }
  not(){
    if(this.peek().kind===TK.NOT){this.eat();return new N('not',{c:[this.primary()]});}
    return this.near();
  }
  near(){
    const l=this.primary();
    if(this.peek().kind===TK.NEAR){const t=this.eat();return new N('near',{c:[l,this.primary()],n:t.nearN});}
    return l;
  }
  primary(){
    const t=this.peek();
    if(t.kind===TK.LP){this.eat(TK.LP);const n=this.or();if(this.peek().kind===TK.RP)this.eat();return n;}
    if(t.kind===TK.PHRASE){this.eat();return new N('phrase',{v:t.val});}
    if(t.kind===TK.FIELD){this.eat();const[fn,fv]=t.val.split(':');return new N('field',{v:t.val,c:[],fn,fv:fv||''});}
    if(t.kind===TK.NOT){this.eat();return new N('not',{c:[this.primary()]});}
    this.eat();return new N('word',{v:t.val});
  }
}

function parseBoolean(q){return new Parser(tokenise(q)).parse();}

// ─── EVALUATOR ────────────────────────────────────────────────────────────────
function surface(n){return n.value||(n.children||[]).map(surface).join(' ');}

function evaluate(node,text){
  const t=text;
  switch(node.kind){
    case 'or':{
      const kids=node.children.map(c=>evaluate(c,t));
      const nm=kids.filter(r=>r.m).length;
      return{m:nm>0,label:'OR',detail:`${nm}/${kids.length} matched`,kids,nk:'or'};
    }
    case 'and':{
      const kids=node.children.map(c=>evaluate(c,t));
      const nf=kids.filter(r=>!r.m).length;
      return{m:nf===0,label:'AND',detail:nf===0?`all ${kids.length} matched`:`${nf} failed`,kids,nk:'and'};
    }
    case 'not':{
      const kid=evaluate(node.children[0],t);
      return{m:!kid.m,label:'NOT',detail:kid.m?'exclusion found → fails':'exclusion absent → passes',kids:[kid],nk:'not'};
    }
    case 'near':{
      const a=surface(node.children[0]).toLowerCase(),b=surface(node.children[1]).toLowerCase();
      const ws=(t.toLowerCase().match(/\w+/g)||[]);
      const pa=ws.flatMap((w,i)=>w.includes(a)?[i]:[]);
      const pb=ws.flatMap((w,i)=>w.includes(b)?[i]:[]);
      const m=pa.some(x=>pb.some(y=>Math.abs(x-y)<=node.nearN));
      return{m,label:`NEAR/${node.nearN}`,detail:`"${a}" & "${b}" — ${m?'within':'not within'} range`,kids:[],nk:'near'};
    }
    case 'phrase':{
      const m=t.toLowerCase().includes(node.value.toLowerCase());
      return{m,label:'phrase',detail:`"${node.value}"`,kids:[],nk:'phrase'};
    }
    case 'word':{
      const w=node.value.replace(/['\.,;:!?*]+$/,'');
      const m=w?new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i').test(t):false;
      return{m,label:'word',detail:`"${node.value}"`,kids:[],nk:'word'};
    }
    case 'field':{
      // Only url: has meaning in text context; others just try to match the value
      const fv=node.fv||'';
      const m=fv?t.toLowerCase().includes(fv.toLowerCase()):false;
      return{m,label:node.fn+':',detail:`"${fv}"`,kids:[],nk:'field'};
    }
    default:
      return{m:true,label:'?',detail:node.value||'',kids:[],nk:'skip'};
  }
}

// ─── SUMMARY ──────────────────────────────────────────────────────────────────
function firstMatch(r){
  if(!r.kids||!r.kids.length)return r.m?r.detail:null;
  for(const c of r.kids){const f=firstMatch(c);if(f)return f;}
  return null;
}

function sampleLeaves(r,max,wantM){
  const out=[];
  (function w(r){
    if(out.length>=max)return;
    if(!r.kids||!r.kids.length){if(r.m===wantM&&r.detail&&r.nk!=='skip')out.push(r.detail);return;}
    r.kids.forEach(w);
  })(r);
  return out;
}

function generateSummary(result){
  const items=[];
  (function walk(r,depth){
    if(depth>3)return;
    if(r.nk==='and'){r.kids.forEach(c=>walk(c,depth+1));return;}
    if(r.nk==='or'){
      if(r.m){
        const hits=sampleLeaves(r,3,true);
        items.push({ok:true,head:'Search terms matched',body:`Found: ${hits.join(', ')}`});
      } else {
        const sample=sampleLeaves(r,4,false);
        const extra=r.kids.length-4;
        items.push({ok:false,
          head:'No search terms found in content',
          body:`Checked: ${sample.join(', ')}${extra>0?` and ${extra} others`:''}`});
      }
      return;
    }
    if(r.nk==='not'){
      if(!r.m){
        const found=firstMatch(r.kids[0]);
        items.push({ok:false,
          head:'Excluded — a blocked term was found',
          body:found?`Triggered by: ${found}`:'A term in the exclusion list matched'});
      } else {
        items.push({ok:true,head:'Exclusion check passed',body:'No blocked terms found'});
      }
      return;
    }
    if(r.nk==='near'){items.push({ok:r.m,head:`Proximity: ${r.detail}`,body:''});return;}
    if(!r.m)items.push({ok:false,head:`Failed: ${r.label} ${r.detail}`,body:''});
  })(result,0);
  return items;
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function countLeaves(r){
  if(!r.kids||!r.kids.length)return{total:1,matched:r.m?1:0};
  return r.kids.reduce((a,c)=>{const s=countLeaves(c);return{total:a.total+s.total,matched:a.matched+s.matched};},{total:0,matched:0});
}

// ─── TREE ─────────────────────────────────────────────────────────────────────
const COLLAPSE=10;
function buildTree(r,container,depth=0){
  const isLeaf=!r.kids||!r.kids.length;
  const el=document.createElement('div');el.className='tree-node';
  const row=document.createElement('div');row.className='row';
  const tog=document.createElement('span');tog.className='tog';
  const ic=document.createElement('span');ic.className='ic';ic.textContent=r.nk==='skip'?'⏭':r.m?'✅':'❌';
  const lb=document.createElement('span');lb.className='lbl';
  const kd=document.createElement('span');
  kd.className='kd '+(r.nk==='not'?'not_':r.nk||'');
  kd.textContent=r.label||'';
  const dt=document.createElement('span');
  dt.className=isLeaf?(r.m?'hit':'miss'):'dt';
  dt.textContent=' '+(r.detail||'');
  lb.appendChild(kd);lb.appendChild(dt);
  row.appendChild(tog);row.appendChild(ic);row.appendChild(lb);
  el.appendChild(row);container.appendChild(el);
  if(r.kids&&r.kids.length){
    const cw=document.createElement('div');cw.className='children';
    const col=r.kids.length>COLLAPSE&&depth>0;
    if(col){
      const nm=r.kids.filter(x=>x.m).length,nf=r.kids.length-nm;
      const btn=document.createElement('span');btn.className='expand-btn';
      btn.innerHTML=`▶ Show all ${r.kids.length} (${nm} matched, ${nf} failed)`;
      let open=false;
      btn.onclick=()=>{open=!open;cw.style.display=open?'':'none';
        btn.innerHTML=open?'▼ Collapse':`▶ Show all ${r.kids.length} (${nm} matched, ${nf} failed)`;};
      el.appendChild(btn);cw.style.display='none';
    } else {
      tog.textContent='▾';row.classList.add('click');
      row.onclick=()=>{el.classList.toggle('collapsed');tog.textContent=el.classList.contains('collapsed')?'▸':'▾';};
    }
    r.kids.forEach(c=>buildTree(c,cw,depth+1));
    el.appendChild(cw);
  }
}

// ─── ITEM MANAGEMENT ─────────────────────────────────────────────────────────
function addItem(){
  const id=nextId++;
  const card=document.createElement('div');
  card.className='item-card';card.id=`item-${id}`;
  card.innerHTML=`
    <div class="item-card-header">
      <span class="item-num">Article / post ${id}</span>
      <button class="btn-remove" onclick="removeItem(${id})" title="Remove">×</button>
    </div>
    <div class="url-row">
      <input type="text" id="url-${id}" placeholder="https://… (press Enter to fetch)"/>
      <button class="btn-fetch" onclick="fetchItem(${id})">Fetch</button>
    </div>
    <div class="item-status" id="status-${id}"></div>
    <div class="or-sep">— or paste text below —</div>
    <textarea id="content-${id}" rows="4" placeholder="Paste article text, tweet, post…"></textarea>
  `;
  document.getElementById('itemsList').appendChild(card);
  card.querySelector(`#url-${id}`).addEventListener('keydown',e=>{if(e.key==='Enter')fetchItem(id);});
}

function removeItem(id){
  const el=document.getElementById(`item-${id}`);
  if(el)el.remove();
}

async function fetchItem(id){
  const urlEl=document.getElementById(`url-${id}`);
  const status=document.getElementById(`status-${id}`);
  const content=document.getElementById(`content-${id}`);
  const url=urlEl.value.trim();
  if(!url)return;
  status.className='item-status loading';status.textContent='Fetching…';content.value='';
  try{
    const res=await fetch('/.netlify/functions/fetch-url',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
    const raw=await res.text();
    let data;
    try{data=JSON.parse(raw);}
    catch{
      if(!res.ok)throw new Error(`Function unavailable (HTTP ${res.status}) — the hosting service may be out of credits. Paste the article text manually instead.`);
      throw new Error('Server returned an unexpected response. Paste the article text manually instead.');
    }
    if(data.error)throw new Error(data.error);
    if(data.warning){status.className='item-status warn';status.textContent='⚠ '+data.warning;return;}
    content.value=data.text;
    status.className='item-status ok';status.textContent=`✓ ${data.text.length.toLocaleString()} chars fetched`;
  }catch(e){
    status.className='item-status err';status.textContent='Error: '+e.message;
  }
}

// ─── TRUNCATE URL ─────────────────────────────────────────────────────────────
function truncate(u,max=65){
  if(!u||u.length<=max)return u;
  try{const p=new URL(u);const path=p.pathname;return p.hostname+(path.length>30?path.slice(0,30)+'…':path);}
  catch{return u.slice(0,max)+'…';}
}

// ─── MAIN CHECK ───────────────────────────────────────────────────────────────
function runCheck(){
  const boolStr=document.getElementById('boolInput').value.trim();
  const resultsArea=document.getElementById('resultsArea');
  resultsArea.innerHTML='';

  if(!boolStr){
    resultsArea.innerHTML='<div class="idle-msg">⚠ Enter a boolean string first.</div>';return;
  }

  let ast;
  try{ast=parseBoolean(boolStr);}
  catch(e){
    resultsArea.innerHTML=`<div class="idle-msg">❌ Boolean parse error: ${e.message}</div>`;return;
  }

  const cards=document.querySelectorAll('.item-card');
  if(!cards.length){
    resultsArea.innerHTML='<div class="idle-msg">Add at least one article or post to test.</div>';return;
  }

  let anyContent=false;
  cards.forEach((card,idx)=>{
    const id=card.id.replace('item-','');
    const url=document.getElementById(`url-${id}`).value.trim();
    const content=document.getElementById(`content-${id}`).value.trim();
    const label=url?truncate(url):`Pasted content ${idx+1}`;

    const rc=document.createElement('div');

    if(!content){
      rc.className='result-card idle';
      rc.innerHTML=`
        <div class="result-head">
          <div class="result-icon">⚠️</div>
          <div><div class="result-verdict" style="color:var(--yellow)">No content</div>
          <div class="result-source">${label} — fetch a URL or paste text</div></div>
        </div>`;
      resultsArea.appendChild(rc);return;
    }

    anyContent=true;
    const result=evaluate(ast,content);
    const summary=generateSummary(result);
    const{total,matched}=countLeaves(result);

    rc.className=`result-card ${result.m?'match':'nomatch'}`;

    // Head
    const head=document.createElement('div');head.className='result-head';
    head.innerHTML=`
      <div class="result-icon">${result.m?'✅':'❌'}</div>
      <div>
        <div class="result-verdict">${result.m?'WOULD BE INGESTED':'WOULD NOT BE INGESTED'}</div>
        <div class="result-source">${label}</div>
      </div>`;
    rc.appendChild(head);

    // Body
    const body=document.createElement('div');body.className='result-body';

    // Why items
    summary.forEach(item=>{
      const d=document.createElement('div');d.className='why-item';
      d.innerHTML=`<div class="why-icon">${item.ok?'✅':'❌'}</div>
        <div class="why-text">
          <strong>${item.head}</strong>
          ${item.body?`<span>${item.body}</span>`:''}
        </div>`;
      body.appendChild(d);
    });

    // Stats line
    const statsLine=document.createElement('div');
    statsLine.style.cssText='font-size:10.5px;color:var(--muted);margin-top:6px;';
    statsLine.textContent=`${matched} of ${total} clauses matched`;
    body.appendChild(statsLine);

    // Tree toggle
    const tog=document.createElement('span');tog.className='tree-toggle';
    tog.textContent='▶ Show full clause breakdown';
    const treeDiv=document.createElement('div');treeDiv.className='result-tree';
    buildTree(result,treeDiv);
    tog.onclick=()=>{
      const open=treeDiv.style.display!=='none';
      treeDiv.style.display=open?'none':'';
      tog.textContent=(open?'▶ Show':'▼ Hide')+' full clause breakdown';
    };
    body.appendChild(tog);
    body.appendChild(treeDiv);

    rc.appendChild(body);
    resultsArea.appendChild(rc);
  });

  if(!anyContent)resultsArea.innerHTML='<div class="idle-msg">No content found — fetch URLs or paste text into the items.</div>';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
addItem();
addItem();
</script>
</body>
</html>
